import gemini.build.distribution.VerifyDistribution
import gemini.build.toolkit.VerifyBuildToolkit
import net.neoforged.gradle.common.tasks.JarJar
import org.gradle.api.tasks.Sync
import org.gradle.api.tasks.bundling.Zip
import java.security.MessageDigest

plugins {
    id 'java-library'
    id 'maven-publish'
    id 'net.neoforged.gradle.userdev' version '7.1.38'
    id 'gemini.slang'
}

tasks.named('wrapper', Wrapper).configure {
    // Define wrapper values here so as to not have to always do so when updating gradlew.properties.
    // Switching this to Wrapper.DistributionType.ALL will download the full gradle sources that comes with
    // documentation attached on cursor hover of gradle classes and methods. However, this comes with increased
    // file size for Gradle. If you do switch this to ALL, run the Gradle wrapper task twice afterwards.
    // (Verify by checking gradle/wrapper/gradle-wrapper.properties to see if distributionUrl now points to `-all`)
    distributionType = Wrapper.DistributionType.BIN
}

version = mod_version
group = mod_group_id

apply from: 'gradle/slang-platforms.gradle'

sourceSets.main.resources {
    // Include resources generated by data generators.
    srcDir('src/generated/resources')

    // Exclude common development only resources from finalized outputs
    exclude("**/*.bbmodel") // BlockBench project files
    exclude("src/generated/**/.cache") // datagen cache files
    // Slang is the source of truth. Minecraft only sees GLSL generated at
    // build time through slang-java and the pinned official Slang natives.
    exclude("assets/gemini/shaders/core/**/*.vsh")
    exclude("assets/gemini/shaders/core/**/*.fsh")
}

repositories {
    mavenLocal()
    mavenCentral()
    maven { url 'https://jitpack.io' }
    maven { url 'https://cursemaven.com' }
}

base {
    archivesName = mod_id
}

// Mojang ships Java 25 to end users in 26.1.2, so mods should target Java 25.
java.toolchain.languageVersion = JavaLanguageVersion.of(25)

//minecraft.accessTransformers.file rootProject.file('src/main/resources/META-INF/accesstransformer.cfg')
//minecraft.accessTransformers.entry public net.minecraft.client.Minecraft textureManager # textureManager

// Default run configurations.
// These can be tweaked, removed, or duplicated as needed.
runs {
    // applies to all the run configs below
    configureEach {
        // Recommended logging data for a userdev environment
        // The markers can be added/remove as needed separated by commas.
        // "SCAN": For mods scan.
        // "REGISTRIES": For firing of registry events.
        // "REGISTRYDUMP": For getting the contents of all registries.
        systemProperty 'forge.logging.markers', 'REGISTRIES'

        // Recommended logging level for the console
        // You can set various levels here.
        // Please read: https://stackoverflow.com/questions/2031163/when-to-use-the-different-log-levels
        systemProperty 'forge.logging.console.level', 'debug'

        workingDirectory project.layout.projectDirectory.dir('run').dir(name)

        modSource project.sourceSets.main
    }

    client {
        // Comma-separated list of namespaces to load gametests from. Empty = all namespaces.
        systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
    }

    server {
        systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        argument '--nogui'
    }

    // This run config launches GameTestServer and runs all registered gametests, then exits.
    // By default, the server will crash when no gametests are provided.
    // The gametest system is also enabled by default for other run configs under the /test command.
    gameTestServer {
        systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
    }

    clientData {
        // example of overriding the workingDirectory set in configureEach above, uncomment if you want to use it
        // workingDirectory project.file('run-data')

        // Specify the modid for data generation, where to output the resulting resource, and where to look for existing resources.
        arguments.addAll '--mod', project.mod_id, '--all', '--output', file('src/generated/resources/').getAbsolutePath(), '--existing', file('src/main/resources/').getAbsolutePath()
    }
}

// Sets up a dependency configuration called 'localRuntime'.
// This configuration should be used instead of 'runtimeOnly' to declare
// a dependency that will be present for runtime testing but that is
// "optional", meaning it will not be pulled by dependents of this mod.
configurations {
    runtimeClasspath.extendsFrom localRuntime

    slangBuildkitRuntime {
        canBeConsumed = false
        canBeResolved = true
        transitive = true
    }
    slangBuildkitNatives {
        canBeConsumed = false
        canBeResolved = true
        transitive = false
    }
}

dependencies {
    implementation "net.neoforged:neoforge:${neo_version}"

    // org.json is the sole runtime dependency installed inside the mod JAR.
    // NeoForge's JarJar keeps it nested and emits loader metadata.
    implementation "org.json:json:${json_version}"
    jarJar "org.json:json:${json_version}"

    slangBuildkitRuntime "io.github.refux:slang-java:${slang_java_version}"
    slangBuildkitNatives "io.github.refux:slang-java-natives:${slang_java_version}:${slangNativeClassifierFor(System.getProperty('os.name'), System.getProperty('os.arch'), findProperty('slangNativeClassifier'))}"
}

// UserDev 7.1.38 provides `jarJar` as a Jar task and already wires it into
// assemble/runtimeElements. Give both artifacts explicit roles so the plain
// development JAR cannot be mistaken for the installable distribution.
tasks.named('jar', Jar) {
    archiveClassifier = 'dev'
}

def installableJar = tasks.named('jarJar', JarJar) {
    archiveClassifier = 'installable'
}

tasks.register('verifyDistribution', VerifyDistribution) {
    group = LifecycleBasePlugin.VERIFICATION_GROUP
    description = 'Verifies the directly installable NeoForge JarJar artifact.'
    archiveFile = installableJar.flatMap { it.archiveFile }
}

tasks.named('check') {
    dependsOn tasks.named('verifyDistribution')
}

// This block of code expands all declared replace properties in the specified resource targets.
// A missing property will result in an error. Properties are expanded using ${} Groovy notation.
// When "copyIdeResources" is enabled, this will also run before the game launches in IDE environments.
// See https://docs.gradle.org/current/dsl/org.gradle.language.jvm.tasks.ProcessResources.html
tasks.withType(ProcessResources).configureEach {
    var replaceProperties = [
            minecraft_version      : minecraft_version,
            minecraft_version_range: minecraft_version_range,
            neo_version            : neo_version,
            mod_id                 : mod_id,
            mod_name               : mod_name,
            mod_license            : mod_license,
            mod_version            : mod_version,
    ]
    inputs.properties replaceProperties

    filesMatching(['META-INF/neoforge.mods.toml']) {
        expand replaceProperties
    }
}

// Example configuration to allow publishing using the maven-publish plugin
publishing {
    publications {
        register('mavenJava', MavenPublication) {
            from components.java
        }
    }
    repositories {
        maven {
            url "file://${project.projectDir}/repo"
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8' // Use the UTF-8 charset for Java compilation
    options.compilerArgs.addAll(['-Xmaxerrs', '2000'])
}

// IDEA no longer automatically downloads sources/javadoc jars for dependencies, so we need to explicitly enable the behavior.
idea {
    module {
        downloadSources = true
        downloadJavadoc = true
    }
}

// ---------------------------------------------------------------------------
// Slang shader translation
// ---------------------------------------------------------------------------

geminiSlang {
    sourceDirectory = layout.projectDirectory.dir('src/main/slang/gemini')
    variantManifest = layout.projectDirectory.file('src/main/slang/variants.json')
    outputDirectory = layout.buildDirectory.dir('generated/slang')
    validationOutputDirectory = layout.buildDirectory.dir('validation/slang/spirv')
}

tasks.named('processResources').configure {
    from(geminiSlang.outputDirectory)
}

// ---------------------------------------------------------------------------
// Platform-specific developer buildkit
// ---------------------------------------------------------------------------

def buildkitClassifier = slangNativeClassifierFor(
        System.getProperty('os.name'),
        System.getProperty('os.arch'),
        findProperty('slangNativeClassifier'))
def allowDirtyBuildkit = providers.gradleProperty('gemini.allowDirtyBuildkit')
        .map { it.toBoolean() }
        .getOrElse(false)
def buildkitStageDirectory = layout.buildDirectory.dir("toolkit/${buildkitClassifier}")
def buildkitArchiveName = "gemini-buildkit-${version}-${buildkitClassifier}.zip"
def buildkitArchive = layout.buildDirectory.file("distributions/${buildkitArchiveName}")

def sha256File = { File input ->
    MessageDigest digest = MessageDigest.getInstance('SHA-256')
    input.withInputStream { stream ->
        byte[] buffer = new byte[8192]
        int read
        while ((read = stream.read(buffer)) >= 0) {
            if (read > 0) digest.update(buffer, 0, read)
        }
    }
    digest.digest().encodeHex().toString()
}

def verifyBuildkitSourceClean = tasks.register('verifyBuildkitSourceClean') {
    group = LifecycleBasePlugin.VERIFICATION_GROUP
    description = 'Refuses buildkit snapshots containing uncommitted source/config changes.'
    doLast {
        if (allowDirtyBuildkit) {
            logger.warn('Building a dirty developer buildkit because -Pgemini.allowDirtyBuildkit=true was supplied.')
            return
        }
        ByteArrayOutputStream output = new ByteArrayOutputStream()
        exec {
            workingDir projectDir
            commandLine 'git', 'status', '--porcelain=v1', '--untracked-files=all', '--',
                    'build.gradle', 'settings.gradle', 'gradle.properties', 'gradlew', 'gradlew.bat',
                    'gradle', 'buildSrc/build.gradle', 'buildSrc/src', 'src/main/java',
                    'src/main/resources', 'src/main/slang', 'src/generated/resources',
                    'README.md', 'LICENSE', 'BUILDING.md', 'THIRD-PARTY-NOTICES'
            standardOutput = output
        }
        String changes = output.toString('UTF-8').trim()
        if (!changes.isEmpty()) {
            throw new GradleException("Refusing to create a developer buildkit from dirty source/config paths:\n${changes}\nCommit/stash those changes, or explicitly use -Pgemini.allowDirtyBuildkit=true for an intentional local snapshot.")
        }
    }
}

def stageBuildToolkit = tasks.register('stageBuildToolkit', Sync) {
    group = 'distribution'
    description = "Stages the ${buildkitClassifier} developer buildkit."
    dependsOn verifyBuildkitSourceClean
    into buildkitStageDirectory
    duplicatesStrategy = DuplicatesStrategy.FAIL
    includeEmptyDirs = false

    from(projectDir) {
        include 'build.gradle', 'settings.gradle', 'gradle.properties', 'gradlew', 'gradlew.bat'
        include 'README.md', 'LICENSE', 'BUILDING.md', 'THIRD-PARTY-NOTICES'
        include 'gradle/wrapper/**', 'gradle/slang-platforms.gradle'
        include 'buildSrc/build.gradle', 'buildSrc/src/**'
        include 'src/main/java/**', 'src/main/resources/**', 'src/main/slang/**'
        include 'src/generated/resources/**'
        exclude '**/.gradle/**', '**/build/**', '**/.git/**', '**/.idea/**', '**/.claude/**'
        exclude '**/run/**', '**/repo/**', '**/tools/**', '**/secrets/**'
        exclude '**/*.spv', '**/generated/slang/**'
    }

    from({ configurations.slangBuildkitRuntime.files }) {
        into 'vendor/slang'
    }
    from({ configurations.slangBuildkitNatives.singleFile }) {
        into 'vendor/slang'
        rename { "slang-java-natives-${slang_java_version}-${buildkitClassifier}.jar" }
    }

    doLast {
        File stage = destinationDir
        List<File> runtimeJars = configurations.slangBuildkitRuntime.files.toList().sort { it.name }
        File nativeSource = configurations.slangBuildkitNatives.singleFile
        String nativeName = "slang-java-natives-${slang_java_version}-${buildkitClassifier}.jar"
        Properties info = new Properties()
        info.setProperty('formatVersion', '1')
        info.setProperty('project', mod_id.toString())
        info.setProperty('projectVersion', version.toString())
        info.setProperty('classifier', buildkitClassifier)
        info.setProperty('slangJavaVersion', slang_java_version.toString())
        info.setProperty('slangBuildTag', slang_build_tag.toString())
        info.setProperty('slangRuntimeJars', runtimeJars.collect { it.name }.join(','))
        info.setProperty('slangNativeJar', nativeName)
        info.setProperty('gradleVersion', gradle.gradleVersion)
        info.setProperty('javaVersion', '25')
        File infoFile = new File(stage, 'BUILD-INFO.properties')
        infoFile.withWriter('ISO-8859-1') { writer ->
            writer.println('# Reproducible Gemini developer buildkit metadata')
            info.stringPropertyNames().sort().each { key -> writer.println("${key}=${info.getProperty(key)}") }
        }
        List<File> stagedJars = runtimeJars.collect { new File(stage, "vendor/slang/${it.name}") }
        stagedJars.add(new File(stage, "vendor/slang/${nativeName}"))
        new File(stage, 'DEPENDENCIES.sha256').withWriter('UTF-8') { writer ->
            stagedJars.sort { it.name }.each { jar ->
                writer.println("${sha256File(jar)}  vendor/slang/${jar.name}")
            }
        }
        File gradlewFile = new File(stage, 'gradlew')
        if (gradlewFile.isFile() && !gradlewFile.setExecutable(true, false)) {
            logger.info('Could not set executable mode on staged gradlew; ZIP task will still request 0755 mode.')
        }
    }
}

def buildToolkitZip = tasks.register('buildToolkitZip', Zip) {
    group = 'distribution'
    description = "Creates the ${buildkitClassifier} developer buildkit ZIP."
    dependsOn stageBuildToolkit
    from buildkitStageDirectory
    destinationDirectory = layout.buildDirectory.dir('distributions')
    archiveFileName = buildkitArchiveName
    reproducibleFileOrder = true
    preserveFileTimestamps = false
    includeEmptyDirs = false
}

tasks.register('verifyBuildToolkit', VerifyBuildToolkit) {
    group = LifecycleBasePlugin.VERIFICATION_GROUP
    description = "Verifies the ${buildkitClassifier} developer buildkit ZIP."
    dependsOn buildToolkitZip
    archiveFile = buildkitArchive
}
